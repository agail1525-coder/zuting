services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: zuting-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zuting}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-zuting}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zuting}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: zuting-redis-prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    container_name: zuting-api-prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-zuting}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-zuting}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://zuting.fszyl.top,http://120.24.31.151:3080,http://120.24.31.151:3083}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      API_PORT: 3002
    expose:
      - "3002"
    networks:
      - internal

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://zuting.fszyl.top}
    container_name: zuting-web-prod
    restart: always
    depends_on:
      - api
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://api:3002
    expose:
      - "3000"
    networks:
      - internal

  admin:
    build:
      context: ..
      dockerfile: apps/admin/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://zuting.fszyl.top}
    container_name: zuting-admin-prod
    restart: always
    depends_on:
      - api
    environment:
      NODE_ENV: production
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: zuting-nginx-prod
    restart: always
    depends_on:
      - api
      - web
      - admin
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment for SSL:
      # - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
